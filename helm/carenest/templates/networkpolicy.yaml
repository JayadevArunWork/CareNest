# Default deny all ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow frontend to receive traffic from HAProxy/Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: haproxy
      ports:
        - port: {{ .Values.ports.frontend }}
---
# Allow backend services to receive traffic from frontend (nginx proxy)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-from-frontend
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [auth, appointment, pharmacy, notify]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: {{ .Values.ports.auth }}
        - port: {{ .Values.ports.appointment }}
        - port: {{ .Values.ports.pharmacy }}
        - port: {{ .Values.ports.notify }}
---
# Allow backend-to-backend (appointment/pharmacy → notify)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-notify-from-backends
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: notify
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [appointment, pharmacy]
      ports:
        - port: {{ .Values.ports.notify }}
---
# Allow MongoDB to receive traffic from backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mongo-from-backends
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: mongo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [auth, appointment, pharmacy, notify]
      ports:
        - port: {{ .Values.ports.mongo }}
---
# Allow Redis to receive traffic from backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-from-backends
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [auth, appointment, pharmacy, notify]
      ports:
        - port: {{ .Values.ports.redis }}
