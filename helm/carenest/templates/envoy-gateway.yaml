# ──────────────────────────────────────────────────────
# Envoy Gateway — Gateway resource
# ──────────────────────────────────────────────────────
# Requires: gateway.envoyproxy.io CRDs + Envoy Gateway controller installed
#
# The Gateway creates Envoy proxy pods that handle all inbound traffic.
# Infrastructure override ensures the auto-created Service uses NodePort
# instead of LoadBalancer (required for bare-metal / EC2 without a cloud LB controller).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: carenest-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: carenest
  annotations:
    # Force the auto-provisioned Envoy proxy service to use NodePort
    # This is critical for EC2/bare-metal where LoadBalancer type won't work
    gateway.envoyproxy.io/service-type: NodePort
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      protocol: HTTP
      port: {{ .Values.gateway.port }}
      allowedRoutes:
        namespaces:
          from: Same
