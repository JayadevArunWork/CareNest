# Envoy Gateway — Gateway resource
# Requires: gateway.envoyproxy.io CRDs installed on cluster
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: carenest-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: carenest
spec:
  gatewayClassName: envoy-gateway-class
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
