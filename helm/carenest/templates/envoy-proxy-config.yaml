# ──────────────────────────────────────────────────────
# Envoy Gateway — EnvoyProxy custom resource
# ──────────────────────────────────────────────────────
# Configures the auto-provisioned Envoy proxy to use NodePort
# so that external HAProxy EC2 can reach the Gateway.
#
# This is the official Envoy Gateway method to control the
# infrastructure provisioning of the proxy fleet.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: carenest-proxy-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: carenest
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: NodePort
        {{- if .Values.gateway.nodePort }}
        ports:
          - port: {{ .Values.gateway.port }}
            targetPort: {{ .Values.gateway.port }}
            nodePort: {{ .Values.gateway.nodePort }}
            protocol: TCP
        {{- end }}
