apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: carenest-routes
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: carenest-gateway
      namespace: {{ .Values.namespace }}

  rules:

    # ── Auth Service (/api/auth/*) ────────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          port: {{ .Values.ports.auth }}

    # ── Appointment Service (/api/appointments/*) ─────
    - matches:
        - path:
            type: PathPrefix
            value: /api/appointments
      backendRefs:
        - name: appointment-service
          port: {{ .Values.ports.appointment }}

    # ── Pharmacy Service (/api/prescriptions/*) ───────
    - matches:
        - path:
            type: PathPrefix
            value: /api/prescriptions
      backendRefs:
        - name: pharmacy-service
          port: {{ .Values.ports.pharmacy }}

    # ── Notify Service (/api/notifications/*) ─────────
    - matches:
        - path:
            type: PathPrefix
            value: /api/notifications
      backendRefs:
        - name: notify-service
          port: {{ .Values.ports.notify }}

    # ── Frontend (catch-all /*) ───────────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: {{ .Values.ports.frontend }}
