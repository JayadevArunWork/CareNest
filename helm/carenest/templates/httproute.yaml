apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: carenest-routes
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: carenest-gateway
      namespace: {{ .Values.namespace }}

  rules:

  # AUTH
  - matches:
      - path:
          type: PathPrefix
          value: /api/auth
    backendRefs:
      - name: auth-service
        port: 3001
        group: ""
        kind: Service

  # APPOINTMENT
  - matches:
      - path:
          type: PathPrefix
          value: /api/appointments
    backendRefs:
      - name: appointment-service
        port: 3002
        group: ""
        kind: Service

  # PHARMACY
  - matches:
      - path:
          type: PathPrefix
          value: /api/prescriptions
    backendRefs:
      - name: pharmacy-service
        port: 3003
        group: ""
        kind: Service

  # NOTIFY
  - matches:
      - path:
          type: PathPrefix
          value: /api/notifications
    backendRefs:
      - name: notify-service
        port: 3004
        group: ""
        kind: Service

  # FRONTEND (CATCH ALL - MUST BE LAST)
  - matches:
      - path:
          type: PathPrefix
          value: /
    backendRefs:
      - name: frontend-service
        port: 80
        group: ""
        kind: Service
