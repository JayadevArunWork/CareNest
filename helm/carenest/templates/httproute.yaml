apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: carenest-routes
  namespace: carenest-dev
spec:
  parentRefs:
    - name: carenest-gateway
      namespace: carenest-dev

  rules:

    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          port: 3001

    - matches:
        - path:
            type: PathPrefix
            value: /api/appointments
      backendRefs:
        - name: appointment-service
          port: 3002

    - matches:
        - path:
            type: PathPrefix
            value: /api/prescriptions
      backendRefs:
        - name: pharmacy-service
          port: 3003

    - matches:
        - path:
            type: PathPrefix
            value: /api/notifications
      backendRefs:
        - name: notify-service
          port: 3004

    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: 80
